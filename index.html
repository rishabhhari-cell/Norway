<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Norway Trip Planner | 25-31 Aug 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --forest: #BA0C2F;
      --forest-2: #00205B;
      --parchment: #F7F9FC;
      --ink: #101828;
      --muted: #5D6B82;
      --line: #D7DEEA;
      --white: #fff;
      --green: #16784C;
      --navy: #00205B;
      --red: #BA0C2F;
      --amber: #b7791f;
      --grey: #737373;
      --pale-red: #FBE8ED;
      --pale-blue: #E8EEF8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--parchment);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    header {
      background: #BA0C2F;
      color: white;
      padding: 24px 18px 16px;
    }

    .wrap {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
    }

    h1, h2, h3 {
      font-family: "Crimson Pro", Georgia, serif;
      letter-spacing: 0;
      margin: 0;
    }

    h1 { font-size: clamp(2rem, 4vw, 4rem); line-height: 0.95; }
    h2 { font-size: 1.8rem; }
    h3 { font-size: 1.35rem; }

    .subtitle {
      margin: 10px 0 18px;
      color: #F7F9FC;
      max-width: 760px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.45);
    }

    .tabs, .section-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    button {
      font: inherit;
      cursor: pointer;
    }

    .tab-btn, .section-btn, .compare-btn {
      border: 1px solid rgba(255,255,255,0.9);
      background: var(--navy);
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      white-space: nowrap;
      min-height: 42px;
      font-family: "Crimson Pro", Georgia, serif;
      font-size: 1.06rem;
      font-weight: 700;
    }

    .tab-btn.active, .section-btn.active {
      background: white;
      color: var(--forest);
      border-color: white;
      font-weight: 700;
    }

    main { padding: 18px 0 42px; }

    .plan-intro {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
    }

    .plan-meta {
      color: var(--muted);
      margin-top: 4px;
    }

    .compare-btn {
      background: var(--navy);
      border-color: var(--navy);
      color: white;
    }

    .panel, .day-card, .booking-table-wrap, .flight-card, .comparison-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 1px 0 rgba(0,32,91,0.08);
    }

    .section-shell {
      background: var(--forest);
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .content-layout {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .content-layout.full-width {
      grid-template-columns: 1fr;
    }

    .day-toc {
      position: sticky;
      top: 12px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 6px;
      box-shadow: 0 1px 0 rgba(0,32,91,0.08);
    }

    .day-toc[hidden] {
      display: none;
    }

    .day-toc-title {
      font-family: "Crimson Pro", Georgia, serif;
      color: var(--forest);
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .day-toc a {
      display: flex;
      gap: 8px;
      align-items: center;
      min-height: 34px;
      border-radius: 7px;
      padding: 6px 8px;
      color: var(--ink);
      text-decoration: none;
      font-family: "Crimson Pro", Georgia, serif;
      font-weight: 700;
      font-size: 1.04rem;
    }

    .day-toc a:hover,
    .day-toc a:focus {
      background: var(--pale-blue);
      color: var(--forest);
      outline: none;
    }

    .toc-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: var(--navy);
      color: white;
      flex: 0 0 auto;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.78rem;
      font-weight: 900;
    }

    #content {
      min-width: 0;
    }

    .day-card {
      margin-bottom: 12px;
      overflow: hidden;
      scroll-margin-top: 12px;
    }

    .day-head {
      background: white;
      color: var(--ink);
      text-align: left;
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .day-head h3 {
      color: var(--forest);
    }

    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 4px 10px;
      background: var(--pale-blue);
      color: var(--navy);
      font-size: 0.88rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .day-body {
      padding: 0 14px 16px;
      border-top: 1px solid var(--line);
    }

    .map {
      height: 360px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--line);
      margin: 14px 0;
      background: var(--pale-blue);
    }

    .leaflet-map {
      width: 100%;
      height: 100%;
      display: block;
    }

    .leaflet-tile {
      color: transparent;
      font-size: 0;
    }

    .leaflet-div-icon {
      background: transparent;
      border: none;
    }

    .num-marker {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--forest);
      color: white;
      display: grid;
      place-items: center;
      border: 2px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      font-weight: 900;
      font-size: 0.86rem;
    }

    .stop-list {
      display: grid;
      gap: 10px;
    }

    .stop-row {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 16px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      min-height: 202px;
    }

    .stop-title {
      font-weight: 800;
      margin-bottom: 4px;
    }

    .stop-desc {
      color: #28364A;
      margin-bottom: 5px;
    }

    .cost {
      font-weight: 800;
      color: var(--forest);
      font-size: 0.92rem;
    }

    .stop-row img {
      width: 260px;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #F7F9FC;
    }

    .stop-row img.broken {
      object-fit: contain;
      padding: 10px;
    }

    .stop-row.no-image {
      grid-template-columns: 1fr;
      min-height: auto;
    }

    .flight-note {
      margin: 12px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #F7F9FC;
    }

    .flight-note summary {
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 800;
      color: var(--forest);
    }

    .flight-note-content {
      padding: 0 12px 12px;
      color: #263247;
    }

    .stay-callout {
      margin: 12px 0;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #F1A5B5;
      background: var(--pale-red);
      color: #6F001C;
      font-weight: 800;
    }

    .booking-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }

    .progress {
      height: 12px;
      background: var(--pale-blue);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--green);
      transition: width 180ms ease;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.94rem;
      table-layout: auto;
    }

    th, td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--navy);
      background: var(--pale-blue);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tr:last-child td { border-bottom: 0; }

    .booking-table-wrap {
      overflow-x: auto;
      width: 100%;
    }

    .booking-table-wrap table {
      min-width: 100%;
    }

    select {
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 7px 9px;
      background: white;
      color: var(--ink);
      min-width: 132px;
      font: inherit;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: white;
      font-weight: 800;
      padding: 4px 9px;
      min-width: 86px;
      margin-top: 6px;
      font-size: 0.83rem;
    }

    .pill.unassigned, .pill.not-started { background: var(--grey); }
    .pill.rish, .pill.booked { background: var(--green); }
    .pill.ben { background: var(--navy); }
    .pill.sujit { background: var(--red); }
    .pill.in-progress { background: var(--amber); color: #231800; }

    a { color: var(--forest-2); font-weight: 800; }

    .callout {
      margin: 14px 0;
      padding: 12px 14px;
      background: var(--pale-red);
      border: 1px solid #F1A5B5;
      border-radius: 8px;
      color: #6F001C;
      font-weight: 700;
    }

    .van-note {
      margin-top: 12px;
      color: var(--muted);
    }

    .flight-grid, .compare-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .flight-card, .comparison-card {
      padding: 16px;
    }

    .flight-card.inbound {
      grid-column: 1 / -1;
    }

    .flight-card ul, .comparison-card ul {
      padding-left: 20px;
      margin: 8px 0 0;
    }

    .matrix {
      margin-top: 18px;
    }

    .ok { color: var(--green); font-weight: 900; }
    .no { color: #b42318; font-weight: 900; }

    #compareView {
      display: none;
      margin-bottom: 18px;
    }

    #compareView.open { display: block; }

    .compare-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    @media (max-width: 820px) {
      .plan-intro, .booking-top, .day-head {
        grid-template-columns: 1fr;
      }

      .badges { justify-content: flex-start; }
      .flight-grid, .compare-grid { grid-template-columns: 1fr; }
      .content-layout { grid-template-columns: 1fr; }
      .day-toc {
        position: static;
        grid-template-columns: repeat(7, minmax(88px, 1fr));
        overflow-x: auto;
      }
      .day-toc-title {
        grid-column: 1 / -1;
      }

      th, td {
        min-width: 130px;
      }
    }

    @media (max-width: 520px) {
      .stop-row {
        grid-template-columns: 1fr;
      }

      .stop-row img {
        width: 100%;
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Norway Trip Planner</h1>
      <p class="subtitle">Rish, Ben and Sujit. Bergen-based motorhome trip, 25-31 Aug 2026.</p>
      <nav class="tabs" id="planTabs" aria-label="Plan tabs"></nav>
    </div>
  </header>

  <main>
    <div class="wrap">
      <section class="plan-intro">
        <div>
          <h2 id="planTitle"></h2>
          <div class="plan-meta" id="planMeta"></div>
        </div>
        <button class="compare-btn" id="compareBtn" type="button">Compare all plans</button>
      </section>

      <section id="compareView"></section>

      <div class="section-shell">
        <nav class="section-tabs" id="sectionTabs" aria-label="Section tabs"></nav>
      </div>

      <div class="content-layout">
        <aside class="day-toc" id="dayToc" aria-label="Day table of contents"></aside>
        <section id="content"></section>
      </div>
    </div>
  </main>

    const sections = ["Itinerary", "Bookings", "Van Comparison", "Flights"];
    let currentPlan = "A";
    let currentSection = "Itinerary";
    function formatCost(gbp) {
      const nok = Math.round(gbp * GBP_TO_NOK);
      return gbp === 0 ? "Free / £0" : `NOK ${nok.toLocaleString("en-GB")} / £${Number(gbp).toLocaleString("en-GB", { maximumFractionDigits: 2 })}pp`;
    }

    function dayTotal(day) {
      return day.stops.reduce((sum, id) => sum + (STOPS[id].gbp || 0), 0);
    }

    function bookingRows(planKey) {
      const rows = [...BOOKING_GROUPS.shared];
      if (["A", "B"].includes(planKey)) rows.push(...BOOKING_GROUPS.AB);
      if (["A", "C"].includes(planKey)) rows.push(...BOOKING_GROUPS.AC);
      if (["B", "C"].includes(planKey)) rows.push(...BOOKING_GROUPS.BC);
      if (planKey === "A") rows.push(...BOOKING_GROUPS.A);
      if (planKey === "B") rows.push(...BOOKING_GROUPS.B);
      return rows.map((row, idx) => ({ id: `${planKey}-${idx}-${row[0].replace(/\W+/g, "-")}`, task: row[0], deadline: row[1], cost: row[2], link: row[3], note: row[4] }));
    }

    function storageKey(id, field) {
      return `norway-trip:${id}:${field}`;
    }

    function getStored(id, field, fallback) {
      return localStorage.getItem(storageKey(id, field)) || fallback;
    }

    function setStored(id, field, value) {
      localStorage.setItem(storageKey(id, field), value);
    }

    function renderStaticMap(day) {
      const mapId = `route-map-${currentPlan}-${PLANS[currentPlan].days.indexOf(day)}`;
      return `<div class="map">
        <div class="leaflet-map" id="${mapId}" data-plan="${currentPlan}" data-day="${PLANS[currentPlan].days.indexOf(day)}" role="img" aria-label="${day.date} route map"></div>
      </div>`;
    }

    function renderPlanTabs() {
      document.getElementById("planTabs").innerHTML = Object.entries(PLANS).map(([key, plan]) =>
        `<button type="button" class="tab-btn ${key === currentPlan ? "active" : ""}" data-plan="${key}">${plan.name}</button>`
      ).join("");
    }

    function renderSectionTabs() {
      document.getElementById("sectionTabs").innerHTML = sections.map(section =>
        `<button type="button" class="section-btn ${section === currentSection ? "active" : ""}" data-section="${section}">${section}</button>`
      ).join("");
    }

    function renderIntro() {
      const plan = PLANS[currentPlan];
      document.getElementById("planTitle").textContent = plan.title;
      document.getElementById("planMeta").textContent = `${plan.tagline}. ${plan.flight}. ${plan.total}.`;

    function renderCompare() {
      const root = document.getElementById("compareView");
      root.innerHTML = `<div class="compare-grid">${Object.values(PLANS).map(plan => `
        <article class="comparison-card">
          <h3>${plan.title}</h3>
          <p><strong>${plan.tagline}</strong></p>
          <p><strong>Total:</strong> ${plan.total}<br><strong>Flight:</strong> ${plan.flight}</p>
          <p><strong>Key activities:</strong> ${plan.summary.activities.join(", ")}</p>
          <p><strong>Pros:</strong></p>

          <p><strong>Cons:</strong></p>
          <ul>${plan.summary.cons.map(item => `<li>${item}</li>`).join("")}</ul>

    function renderDayToc() {
      const layout = document.querySelector(".content-layout");
      const toc = document.getElementById("dayToc");
      if (currentSection !== "Itinerary") {
        toc.hidden = true;
        toc.innerHTML = "";

        return;
      }

      layout.classList.remove("full-width");
      toc.hidden = false;
      toc.innerHTML = `<div class="day-toc-title">Days</div>${PLANS[currentPlan].days.map((day, index) =>
        `<a href="#day-${currentPlan}-${index + 1}"><span class="toc-num">${index + 1}</span><span>${day.date.replace(" Aug", "")}</span></a>`
      ).join("")}`;
    }

    function renderItinerary() {
      const plan = PLANS[currentPlan];
      return plan.days.map((day, index) => {
        const total = dayTotal(day);
        return `<article class="day-card" id="day-${currentPlan}-${index + 1}" data-day="${index}">
          <div class="day-head">
            <div>
              <h3>${day.date}: ${day.label}</h3>
            </div>
            <div class="badges">
              <span class="badge">Drive ${day.drive}</span>
              <span class="badge">£${Math.round(total)} day cost</span>
            </div>
          </div>
          <div class="day-body">
            ${renderStaticMap(day)}
            ${day.stops.some(id => STOPS[id].isHytte) ? `<div class="stay-callout">🏡 ${STOPS[day.stops.find(id => STOPS[id].isHytte)].hytteNote}</div>` : ""}

                const stop = STOPS[id];

                  <div>
                    <div class="stop-title">${stop.icon} ${stop.name} <span class="plan-meta">(${stop.type})</span></div>
                    <div class="stop-desc">${stop.desc}</div>
                    <div class="cost">${formatCost(stop.gbp)}</div>
                  </div>
                  <img class="stop-photo" alt="${stop.name}" loading="lazy" hidden data-stop-id="${id}" data-image-query="${stop.imageQuery || stop.name}" onerror="handleImageError(this)">

              }).join("")}

          </div>

    function renderBookings() {

          <h3>Booking progress</h3>
          <div class="progress" aria-label="${booked} of ${rows.length} items booked"><span style="width:${(booked / rows.length) * 100}%"></span></div>

      <div class="booking-table-wrap">
        <table>
          <thead><tr><th>Task</th><th>Deadline</th><th>Cost (pp)</th><th>Assignee</th><th>Status</th><th>Link</th></tr></thead>
          <tbody>${rows.map(row => {
            const assignee = getStored(row.id, "assignee", "Unassigned");
            const status = getStored(row.id, "status", "Not started");

              <td><strong>${row.task}</strong>${row.note ? `<br><span class="plan-meta">${row.note}</span>` : ""}</td>

              <td>
                <select data-booking="${row.id}" data-field="assignee">
                  ${["Unassigned", "Rish", "Ben", "Sujit"].map(name => `<option ${assignee === name ? "selected" : ""}>${name}</option>`).join("")}

          }).join("")}</tbody>

    function renderContent() {
      const content = document.getElementById("content");
      if (currentSection === "Itinerary") content.innerHTML = renderItinerary();
      if (currentSection === "Bookings") content.innerHTML = renderBookings();
      if (currentSection === "Van Comparison") content.innerHTML = renderVans();
      if (currentSection === "Flights") content.innerHTML = renderFlights();
      if (currentSection === "Itinerary") {
        loadStopImages();
        initRouteMaps();
      }
    }

    const imageCache = new Map();

    async function getWikipediaImage(query) {
      if (imageCache.has(query)) return imageCache.get(query);
      const api = "https://en.wikipedia.org/w/api.php";
      const searchUrl = `${api}?origin=*&action=query&generator=search&gsrsearch=${encodeURIComponent(query)}&gsrlimit=1&prop=pageimages&piprop=thumbnail&pithumbsize=900&format=json`;
      try {
        const response = await fetch(searchUrl);
        const data = await response.json();
        const page = data.query && data.query.pages && Object.values(data.query.pages)[0];
        const src = page && page.thumbnail && page.thumbnail.source ? page.thumbnail.source : null;
        imageCache.set(query, src);
        return src;
      } catch (error) {
        imageCache.set(query, null);
        return null;
      }
    }

    async function resolveStopImage(stop) {
      if (stop.explicitPhoto) return stop.explicitPhoto;
      return getWikipediaImage(stop.imageQuery || stop.name);
    }

    function loadStopImages() {
      document.querySelectorAll("img[data-image-query]").forEach(img => {
        const stop = STOPS[img.dataset.stopId];
        resolveStopImage(stop).then(src => {
          if (!img.isConnected) return;
          if (src) {
            img.src = src;
            img.hidden = false;
          } else {
            hideStopImage(img);
          }
        });
      });
    }

    function hideStopImage(img) {
      const row = img.closest(".stop-row");
      if (row) row.classList.add("no-image");
      img.remove();
    }

    function handleImageError(img) {
      const stop = STOPS[img.dataset.stopId];
      if (stop && stop.fallbackQuery && img.dataset.usedFallback !== "true") {
        img.dataset.usedFallback = "true";
        getWikipediaImage(stop.fallbackQuery).then(src => {
          if (!img.isConnected) return;
          if (src) {
            img.src = src;
            img.hidden = false;
          } else {
            hideStopImage(img);
          }
        });
        return;
      }
      hideStopImage(img);
    }

    function initRouteMaps() {
      if (!window.L) return;
      setTimeout(() => {
        document.querySelectorAll(".leaflet-map").forEach(el => {
          if (el.dataset.ready === "true") return;
          const day = PLANS[el.dataset.plan].days[Number(el.dataset.day)];
          const stops = day.stops.map(id => STOPS[id]);
          const coords = stops.map(stop => stop.coord);
          const map = L.map(el, { scrollWheelZoom: false });
          L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
          }).on("tileerror", event => {
            event.tile.style.opacity = "0";
          }).addTo(map);
          coords.forEach((coord, index) => {
            const icon = L.divIcon({
              html: `<div class="num-marker">${index + 1}</div>`,
              className: "",
              iconSize: [30, 30],
              iconAnchor: [15, 15]
            });
            L.marker(coord, { icon }).addTo(map).bindPopup(`<strong>${index + 1}. ${stops[index].name}</strong><br>${stops[index].desc}`);
          });
          L.polyline(coords, { color: "#00205B", weight: 5, opacity: 0.9 }).addTo(map);
          map.fitBounds(coords, { padding: [34, 34], maxZoom: 11 });
          el.dataset.ready = "true";
          setTimeout(() => map.invalidateSize(), 80);
        });
      }, 0);
    }

    function renderAll() {
      renderPlanTabs();
      renderSectionTabs();
      renderIntro();
      renderCompare();
      renderDayToc();
      renderContent();
    }

    document.addEventListener("click", event => {
      const planBtn = event.target.closest("[data-plan]");
      if (planBtn) {
        currentPlan = planBtn.dataset.plan;
        renderAll();
        return;
      }

      const sectionBtn = event.target.closest("[data-section]");
      if (sectionBtn) {
        currentSection = sectionBtn.dataset.section;
        renderAll();
        return;
      }

      if (event.target.id === "compareBtn") {
        document.getElementById("compareView").classList.toggle("open");
      }
    });

    document.addEventListener("change", event => {
      const select = event.target.closest("select[data-booking]");
      if (!select) return;
      setStored(select.dataset.booking, select.dataset.field, select.value);
      renderContent();
    });

    renderAll();
  </script>
